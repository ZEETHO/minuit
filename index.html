<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MINUIT — Learn French</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#e52521">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MINUIT">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#8ecbff; --sky2:#cdeeff; --cloud:#ffffff;
  --ground:#c8743a; --brick:#e0853c; --brickLine:#a85f25;
  --block:#f7c948; --blockEdge:#b5740f; --blockShade:#d99a1f;
  --pipe:#3bbf57; --pipeDark:#2a9e44;
  --red:#e52521; --coin:#ffd24a; --ink:#2b2440; --muted:#7a6f96;
  --panel:#fff7e6; --panel2:#ffe9c2; --border:#d8ab5e;
  --green:#3bbf57; --redX:#e52521; --gold:#ffd24a; --blue:#4f86ff;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  color:var(--ink); min-height:100vh; font-family:"Baloo 2","Avenir Next",system-ui,sans-serif;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.9) 0 6px, transparent 7px),
    radial-gradient(circle at 22% 12%, rgba(255,255,255,.9) 0 14px, transparent 15px),
    radial-gradient(circle at 75% 20%, rgba(255,255,255,.85) 0 5px, transparent 6px),
    radial-gradient(circle at 79% 20%, rgba(255,255,255,.85) 0 11px, transparent 12px),
    linear-gradient(180deg,var(--sky) 0%, var(--sky2) 55%, #eaf7ff 100%);
}
/* brick ground footer decoration */
#ground{position:fixed;left:0;right:0;bottom:0;height:54px;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(90deg,var(--brick) 0 38px, var(--brickLine) 38px 40px),
    var(--ground);
  border-top:5px solid #8a4f1e;
  box-shadow:inset 0 4px 0 rgba(255,255,255,.25);
  background-size:40px 27px, 100% 100%;
}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 16px 150px}

/* ===== top bar ===== */
#topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 4px 10px}
.logo{font-family:"Press Start 2P",monospace;font-size:1rem;color:var(--red);text-shadow:2px 2px 0 #fff,3px 3px 0 #b51410;letter-spacing:1px}
.logo .moon{margin-right:4px}
.logo span.m{color:var(--blue);text-shadow:2px 2px 0 #fff,3px 3px 0 #1d4fb5}
.spacer{flex:1}
.stat{display:flex;align-items:center;gap:5px;font-weight:800;font-size:1rem;background:var(--panel);
  border:3px solid var(--border);border-radius:14px;padding:5px 11px;box-shadow:0 3px 0 #b98a3e}
.stat .lbl{font-size:.6rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.stat.streak{color:#ff7a00} .stat.coin{color:#b5860a}
.langbtn{background:var(--red);border:3px solid #b51410;color:#fff;font-family:"Press Start 2P",monospace;
  font-size:.65rem;padding:9px 10px;border-radius:14px;cursor:pointer;box-shadow:0 3px 0 #7d0e0b;transition:transform .1s}
.langbtn:active{transform:translateY(3px);box-shadow:none}

/* ===== path ===== */
#pathView h2.unit{margin:24px 0 4px;font-family:"Press Start 2P",monospace;font-size:.7rem;color:#fff;
  text-shadow:2px 2px 0 var(--pipeDark);display:flex;align-items:center;gap:10px;letter-spacing:1px}
h2.unit::after{content:"";flex:1;height:4px;background:repeating-linear-gradient(90deg,var(--block) 0 8px,var(--blockEdge) 8px 12px);border-radius:3px}
.unitDesc{color:#3a3357;font-weight:700;font-size:.85rem;margin-bottom:16px;text-shadow:0 1px 0 #fff}
.path{display:flex;flex-direction:column;gap:30px;padding:8px 0 14px}
.node{width:84px;height:84px;border-radius:16px;position:relative;cursor:pointer;
  background:linear-gradient(180deg,var(--block),#f3b322);border:4px solid var(--blockEdge);
  box-shadow:inset 0 -8px 0 var(--blockShade),0 6px 0 #8a5a0e;
  display:flex;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace;
  font-size:1.7rem;color:#7a4a08;align-self:center;transition:transform .12s}
.node:nth-child(3n+1){align-self:flex-start;margin-left:14%}
.node:nth-child(3n){align-self:flex-end;margin-right:14%}
.node:active{transform:translateY(4px);box-shadow:inset 0 -8px 0 var(--blockShade),0 2px 0 #8a5a0e}
.node .q{text-shadow:2px 2px 0 #ffe9a8}
.node.done{background:radial-gradient(circle at 38% 32%,#fff3b0,var(--coin));color:#b5860a}
.node.done .q{display:none}
.node.done::after{content:"★";font-size:2rem}
.node.next{background:linear-gradient(180deg,var(--red),#c01612);color:#fff;border-color:#7d0e0b;
  box-shadow:inset 0 -8px 0 #9c100d,0 6px 0 #6e0b08,0 0 18px 3px rgba(255,210,74,.8);animation:bounce 1.5s infinite}
.node.next .q{color:#fff;text-shadow:2px 2px 0 #7d0e0b}
.node.locked{filter:grayscale(.85) brightness(.85);opacity:.7;cursor:not-allowed}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.node .label{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  font-size:.74rem;font-weight:800;color:#3a3357;white-space:nowrap;text-shadow:0 1px 0 #fff}
.node.next .label{color:var(--red)}
.node .crown{position:absolute;top:-16px;right:-8px;font-size:1.2rem;animation:spin 3s infinite linear}
@keyframes spin{to{transform:rotate(360deg)}}
.mascot{position:fixed;bottom:64px;right:18px;font-size:2.8rem;z-index:30;cursor:pointer;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));transition:transform .2s}
.mascot:hover{transform:scale(1.15) rotate(-8deg)}
.bubble{position:fixed;bottom:140px;right:20px;z-index:30;background:var(--panel);border:3px solid var(--border);
  padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:.82rem;max-width:230px;font-weight:700;color:var(--ink);
  opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;box-shadow:0 4px 0 #b98a3e}
.bubble.show{opacity:1;transform:none}

/* ===== lesson ===== */
#lessonView{display:none}
.lessonTop{display:flex;align-items:center;gap:12px;padding:14px 0}
.quit{background:var(--panel);border:3px solid var(--border);border-radius:12px;color:var(--ink);
  font-size:1.3rem;width:42px;height:42px;cursor:pointer;font-weight:900;box-shadow:0 3px 0 #b98a3e}
.quit:active{transform:translateY(3px);box-shadow:none}
.lbar{flex:1;height:16px;background:var(--panel);border:3px solid var(--border);border-radius:99px;overflow:hidden;box-shadow:inset 0 2px 0 rgba(0,0,0,.1)}
.lfill{height:100%;width:0%;background:repeating-linear-gradient(90deg,var(--green) 0 10px,var(--pipeDark) 10px 14px);border-radius:99px;transition:width .4s cubic-bezier(.3,1.3,.5,1)}
.lhearts{font-weight:900;color:var(--redX);font-size:1.1rem}
.exType{font-family:"Press Start 2P",monospace;color:#fff;text-shadow:2px 2px 0 var(--pipeDark);font-size:.62rem;text-transform:uppercase;margin:14px 0 8px;letter-spacing:.5px}
.prompt{font-size:1.5rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--ink)}
.hearBtn{background:var(--red);border:3px solid #b51410;color:#fff;font-size:1.3rem;width:54px;height:54px;
  cursor:pointer;border-radius:14px;box-shadow:0 4px 0 #7d0e0b;transition:transform .1s}
.hearBtn:active{transform:translateY(3px);box-shadow:none}
.pron{color:#5a4f7a;font-style:italic;font-weight:700;font-size:.9rem;margin-bottom:16px}
.opts{display:grid;gap:12px;margin:18px 0}
.opt{background:var(--panel);border:3px solid var(--border);border-bottom-width:6px;color:var(--ink);
  padding:15px 16px;border-radius:var(--radius);cursor:pointer;font-size:1.05rem;font-weight:800;
  text-align:left;transition:all .14s;display:flex;gap:12px;align-items:center}
.opt .key{width:28px;height:28px;border:2px solid var(--border);border-radius:8px;color:var(--muted);
  display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;background:var(--panel2);font-family:"Press Start 2P",monospace}
.opt:hover{border-color:var(--blue);background:var(--panel2);transform:translateY(-2px)}
.opt.sel{border-color:var(--blue);background:#dcebff}
.opt.right{border-color:var(--green);background:#dff7e6;animation:pop .35s}
.opt.wrong{border-color:var(--redX);background:#ffe0df;animation:shake .35s}
@keyframes pop{50%{transform:scale(1.03)}}
@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.answerZone{min-height:62px;border:3px dashed var(--border);border-radius:var(--radius);background:var(--panel);
  display:flex;gap:8px;flex-wrap:wrap;padding:10px;margin:16px 0 22px}
.bank{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--block);border:3px solid var(--blockEdge);border-bottom-width:6px;color:#7a4a08;
  padding:9px 15px;border-radius:14px;cursor:pointer;font-weight:800;font-size:1rem;transition:all .14s;font-family:inherit}
.chip:hover{transform:translateY(-2px)}
.chip.used{opacity:.25;pointer-events:none}
.answerZone .chip{background:var(--blue);border-color:#1d4fb5;color:#fff}
.typeIn{width:100%;background:var(--panel);border:3px solid var(--border);border-radius:var(--radius);
  color:var(--ink);padding:15px;font-size:1.1rem;margin:16px 0;outline:none;font-family:inherit;font-weight:700}
.typeIn:focus{border-color:var(--blue)}
.checkBar{position:fixed;bottom:0;left:0;right:0;z-index:45;padding:14px;background:var(--panel);border-top:4px solid var(--border)}
.checkInner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
.feedback{flex:1;font-weight:800;font-size:.95rem;display:none;line-height:1.3}
.feedback.good{display:block;color:var(--green)}
.feedback.bad{display:block;color:var(--redX)}
.feedback small{display:block;font-weight:700;color:#5a4f7a;font-size:.78rem;margin-top:2px}
.bigBtn{background:var(--green);border:3px solid #1d7a3a;color:#053b18;font-family:"Press Start 2P",monospace;
  font-size:.7rem;letter-spacing:1px;padding:15px 26px;border-radius:16px;cursor:pointer;box-shadow:0 4px 0 #14632e;
  transition:all .14s;text-transform:uppercase;margin-left:auto}
.bigBtn:disabled{background:#cbd5e0;border-color:#9aa6b2;color:#7a8694;box-shadow:0 4px 0 #8492a0;cursor:not-allowed}
.bigBtn:not(:disabled):active{transform:translateY(3px);box-shadow:none}
.bigBtn.continue{background:var(--coin);border-color:#b5860a;color:#5a3f00;box-shadow:0 4px 0 #8a6608}

/* ===== results ===== */
#resultView{display:none;text-align:center;padding-top:8vh}
.resEmoji{font-size:4.5rem;animation:bounce 1.4s infinite}
#resultView h2{font-family:"Press Start 2P",monospace;font-size:.95rem;margin:14px 0 6px;color:var(--red);text-shadow:2px 2px 0 #fff}
#resultView p{color:#3a3357;font-weight:700;margin-bottom:22px}
.resStats{display:flex;gap:12px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
.resBox{background:var(--panel);border:3px solid var(--border);border-radius:var(--radius);padding:14px 18px;min-width:104px;box-shadow:0 4px 0 #b98a3e}
.resBox .n{font-size:1.5rem;font-weight:900;font-family:"Press Start 2P",monospace}
.resBox .t{font-size:.6rem;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:6px;letter-spacing:.5px}

/* ===== splash ===== */
#splash{position:fixed;inset:0;z-index:999;background:linear-gradient(180deg,var(--sky),var(--sky2));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-cat{font-size:5rem;filter:drop-shadow(0 6px 14px rgba(0,0,0,.3));animation:popin .6s cubic-bezier(.3,1.5,.5,1)}
.splash-moon{font-size:2.2rem;animation:tw 2.4s infinite alternate;margin-top:-10px}
@keyframes tw{from{transform:scale(1)}to{transform:scale(1.15) rotate(8deg)}}
.splash-name{font-family:"Press Start 2P",monospace;font-size:1.3rem;color:var(--red);text-shadow:2px 2px 0 #fff,3px 3px 0 #b51410}
.splash-name .m{color:var(--blue);text-shadow:2px 2px 0 #fff,3px 3px 0 #1d4fb5}
@keyframes popin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}

/* ===== a2hs ===== */
#a2hs{position:fixed;left:0;right:0;top:0;z-index:300;background:var(--red);color:#fff;
  display:flex;align-items:center;gap:12px;padding:12px 14px;font-size:.85rem;font-weight:800;
  box-shadow:0 4px 14px rgba(0,0,0,.3);animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:none}}
.a2hs-ico{font-size:1.5rem;flex:none}.a2hs-txt{flex:1;line-height:1.3}.a2hs-txt b{font-weight:900}
.a2hs-x{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;opacity:.85;flex:none}

/* ===== install modal ===== */
#installModal{position:fixed;inset:0;z-index:400;background:rgba(20,12,40,.8);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:18px}
#installModal.show{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.im-card{background:var(--panel);border:4px solid var(--border);border-radius:22px;width:min(440px,100%);
  max-height:86vh;overflow-y:auto;position:relative;padding:22px 20px 18px;animation:pop .35s cubic-bezier(.3,1.4,.5,1);box-shadow:0 8px 0 #b98a3e}
.im-close{position:absolute;top:14px;right:16px;background:var(--red);border:2px solid #b51410;color:#fff;
  width:30px;height:30px;border-radius:9px;font-size:1rem;cursor:pointer;font-weight:900}
.im-head{display:flex;gap:14px;align-items:center;margin-bottom:16px;padding-right:30px}
.im-cat{font-size:2.6rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3))}
.im-title{font-family:"Press Start 2P",monospace;font-size:.85rem;color:var(--red)}
.im-sub{font-size:.78rem;color:#5a4f7a;font-weight:700;margin-top:4px;line-height:1.3}
.im-tabs{display:flex;gap:8px;margin-bottom:16px}
.im-tab{flex:1;background:var(--panel2);border:3px solid var(--border);color:#5a4f7a;padding:10px;border-radius:12px;
  cursor:pointer;font-weight:800;font-size:.85rem;font-family:inherit;transition:all .2s}
.im-tab.active{background:var(--red);color:#fff;border-color:#7d0e0b}
.im-step{display:flex;gap:12px;align-items:flex-start;padding:11px 2px;border-bottom:2px dashed var(--border)}
.im-step:last-child{border-bottom:none}
.im-num{flex:none;width:30px;height:30px;border-radius:8px;background:var(--coin);color:#5a3f00;font-weight:900;
  display:flex;align-items:center;justify-content:center;font-size:.95rem;font-family:"Press Start 2P",monospace;border:2px solid #b5860a}
.im-step .im-ico{font-size:1.5rem}
.im-step .im-text{flex:1;line-height:1.4;font-size:.88rem;font-weight:700}
.im-step .im-text b{color:var(--red)}
.im-foot{text-align:center;color:#5a4f7a;font-weight:700;font-size:.75rem;margin-top:12px}

/* ===== toast ===== */
#toast{position:fixed;left:50%;top:18%;transform:translateX(-50%) translateY(-20px);z-index:500;
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:14px;font-weight:800;font-size:.9rem;
  opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.confetti{position:fixed;top:-14px;font-size:1.3rem;z-index:200;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="ground"></div>

<div id="splash">
  <div class="splash-cat">🐈‍⬛</div>
  <div class="splash-moon">🌙</div>
  <div class="splash-name">MIN<span class="m">UIT</span></div>
</div>

<div id="a2hs" style="display:none">
  <div class="a2hs-ico">📲</div>
  <div class="a2hs-txt" id="a2hsTxt"></div>
  <button class="a2hs-x" onclick="document.getElementById('a2hs').style.display='none';localStorage.setItem('minuit_a2hs','1')">✕</button>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo"><span class="moon">🌙</span>MIN<span class="m">UIT</span></div>
    <div class="spacer"></div>
    <div class="stat streak"><span>🔥</span><span id="stStreak">0</span></div>
    <div class="stat coin"><span>🪙</span><span id="stCoin">0</span></div>
    <button class="langbtn" id="langBtn" onclick="cycleLang()">EN</button>
  </div>

  <div id="pathView"></div>

  <div id="lessonView">
    <div class="lessonTop">
      <button class="quit" onclick="quitLesson()">✕</button>
      <div class="lbar"><div class="lfill" id="lfill"></div></div>
      <div class="lhearts" id="lhearts">❤️ 5</div>
    </div>
    <div id="exArea"></div>
  </div>

  <div id="resultView">
    <div class="resEmoji" id="resEmoji">🐈‍⬛</div>
    <h2 id="resTitle">Leçon terminée !</h2>
    <p id="resSub">The Paris night is yours.</p>
    <div class="resStats">
      <div class="resBox"><div class="n" style="color:var(--blue)" id="resXP">+0</div><div class="t" id="lblXP">STARS</div></div>
      <div class="resBox"><div class="n" style="color:var(--green)" id="resAcc">0%</div><div class="t" id="lblAcc">ACCURACY</div></div>
      <div class="resBox"><div class="n" style="color:#ff7a00" id="resStreak">0</div><div class="t" id="lblStreak">STREAK</div></div>
    </div>
    <button class="bigBtn continue" onclick="backToPath()">CONTINUE</button>
  </div>

  <div class="bubble" id="bubble"></div>
  <div class="mascot" id="mascot" onclick="openInstall()" title="How to install">🐈‍⬛</div>

  <div id="installModal" onclick="if(event.target===this)closeInstall()">
    <div class="im-card">
      <button class="im-close" onclick="closeInstall()">✕</button>
      <div class="im-head">
        <div class="im-cat">🐈‍⬛</div>
        <div><div class="im-title" id="imTitle">Install MINUIT</div>
        <div class="im-sub" id="imSub"></div></div>
      </div>
      <div class="im-tabs">
        <button class="im-tab active" id="imTabIos" onclick="setPlatform('ios',this)">📱 iPhone</button>
        <button class="im-tab" id="imTabAnd" onclick="setPlatform('android',this)">🤖 Android</button>
      </div>
      <div class="im-body" id="imBody"></div>
      <div class="im-foot" id="imFoot"></div>
    </div>
  </div>

  <div class="checkBar" id="checkBar" style="display:none">
    <div class="checkInner">
      <div class="feedback" id="feedback"></div>
      <button class="bigBtn" id="checkBtn" disabled onclick="onCheck()">CHECK</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ================= I18N ================= */
const I18N = {
  en:{
    unit:"UNIT", translateToEnglish:"Translate to English", translateToFrench:"Translate to French",
    whatDoYouHear:"What do you hear?", buildSentence:"Build the sentence",
    check:"CHECK", cont:"CONTINUE", correct:"Correct!", notQuite:"Not quite",
    answer:"Answer", youSaid:"You said", lessonComplete:"Lesson complete!", nightYours:"The Paris night is yours.",
    lblXP:"STARS", lblAcc:"ACCURACY", lblStreak:"STREAK", outHearts:"Out of hearts!", tryAgain:"Out of hearts — but the night is long. Try again!",
    installTitle:"Install MINUIT", installSub:"Your Paris-night French app — free, offline, no App Store",
    alreadyInstalled:"Already installed? Just open it from your home screen. 🌙",
    a2hs:"Install MINUIT: tap Share ⤴ then “Add to Home Screen”",
    streak:"Day streak", coins:"Stars", langName:"English",
    mascot:["Minou says: 15 minutes a night keeps the streak alive. 🌙","Say every answer out loud — your mouth learns too!","Tip: 'Je voudrais' + pointing = survival in all of France.","The night is dark and full of verbs. ⚡","Streaks are earned after midnight... or any time, really.","Open the install guide — tap me, then 'Add to Home Screen'. 📲"],
    ios:[
      {ico:"🌐",t:"Open <b>minuit</b> in <b>Safari</b> — this guide only works in Safari, not in-app browsers."},
      {ico:"⤴️",t:"Tap the <b>Share</b> button (square with up-arrow) at the bottom."},
      {ico:"📲",t:"Scroll the menu and tap <b>“Add to Home Screen”</b>."},
      {ico:"✏️",t:"Keep the name <b>MINUIT</b> (or rename) and tap <b>Add</b> top-right."},
      {ico:"🌙",t:"Close Safari. The <b>MINUIT</b> icon is on your home screen — tap to open fullscreen, offline."}],
    android:[

const S=JSON.parse(localStorage.getItem('minuit')||'{}');
S.coin=S.coin||0; S.done=S.done||{}; S.streak=S.streak||0; S.lastDay=S.lastDay||null;
function save(){localStorage.setItem('minuit',JSON.stringify(S))}
function today(){return new Date().toISOString().slice(0,10)}
function bumpStreak(){const tn=today();if(S.lastDay===tn)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=tn;save();}
function refreshStats(){document.getElementById('stCoin').textContent=S.coin;document.getElementById('stStreak').textContent=S.streak;}

/* ================= SPEECH ================= */
let frVoice=null;
function pickVoice(){const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith('fr'));
  frVoice=v.find(x=>/Thomas|Amélie|Audrey|Google/i.test(x.name))||v[0]||null;}
speechSynthesis.onvoiceschanged=pickVoice;pickVoice();
function speak(tt){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(tt.replace(/[?!]/g,''));
  u.lang='fr-FR';if(frVoice)u.voice=frVoice;u.rate=.85;speechSynthesis.speak(u);}

/* ================= PATH ================= */
const pathView=document.getElementById('pathView');
function lessonKey(u,l){return u+'_'+l}
function renderPath(){
  pathView.innerHTML='';
  let nextFound=false;
  COURSE.forEach((unit,ui)=>{
    const h=document.createElement('h2');h.className='unit';h.textContent='✶ '+t('unit')+' '+unit.unit;
    const d=document.createElement('p');d.className='unitDesc';d.textContent=unit.desc;
    const path=document.createElement('div');path.className='path';
    unit.lessons.forEach((les,li)=>{
      const key=lessonKey(ui,li);const done=!!S.done[key];const n=document.createElement('div');
      let cls='node';
      if(done)cls+=' done';else if(!nextFound){cls+=' next';nextFound=true;}else cls+=' locked';
      n.className=cls;
      n.innerHTML=`<span class="q">?</span><span class="label">${les.name}</span>${done?'<span class="crown">👑</span>':''}`;
      if(!n.classList.contains('locked'))n.onclick=()=>startLesson(ui,li);
      path.appendChild(n);
    });
    pathView.append(h,d,path);
  });
  refreshStats();
}

/* ================= EXERCISES ================= */
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[1]).map(p=>p[1])}
const ALLPAIRS=COURSE.flatMap(u=>u.lessons.flatMap(l=>l.pairs));
function distractors(correct,n,field){
  const out=[];const pool=shuffle(ALLPAIRS);
  for(const p of pool){const v=field===2?p[2]:p[0];if(v!==correct&&!out.includes(v)){out.push(v);if(out.length===n)break;}}
  return out;
}
function buildExercises(les){
  const ex=[];shuffle(les.pairs).forEach((p,i)=>{
    const ty=i%3;if(ty===0)ex.push({type:'fr2en',pair:p});else if(ty===1)ex.push({type:'listen',pair:p});else ex.push({type:'en2fr',pair:p});
  });
  les.sentences.forEach(s=>ex.push({type:'bank',s}));
  return shuffle(ex).slice(0,9);
}

let L=null;
function startLesson(ui,li){
  const les=COURSE[ui].lessons[li];
  L={ui,li,ex:buildExercises(les),i:0,hearts:5,right:0,wrong:0,answered:false,sel:null,bankSel:[]};
  document.getElementById('pathView').style.display='none';
  document.getElementById('resultView').style.display='none';
  document.getElementById('lessonView').style.display='block';
  document.getElementById('checkBar').style.display='block';
  document.getElementById('mascot').style.display='none';
  renderEx();
}
function quitLesson(){document.getElementById('lessonView').style.display='none';document.getElementById('checkBar').style.display='none';
  document.getElementById('pathView').style.display='block';document.getElementById('mascot').style.display='block';speechSynthesis.cancel();}
function backToPath(){quitLesson();document.getElementById('resultView').style.display='none';renderPath();}

    html=`<div class="exType">${t('buildSentence')}</div><div class="prompt">“${e.s.en}”</div>
      <div class="answerZone" id="azone"></div>
      <div class="bank" id="bank">${words.map((w,i)=>`<button class="chip" data-w="${esc(w)}" data-i="${i}" onclick="pickChip(this)">${w}</button>`).join('')}</div>`;
    area.innerHTML=html;
  }
}
function esc(s){return s.replace(/'/g,"\\'")}
function renderOpts(opts,correct,speakOnPick){
  const box=document.getElementById('opts');
  opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="key">${i+1}</span> ${o}`;b.dataset.v=o;
    b.onclick=()=>{if(L.answered)return;box.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');L.sel=o;if(speakOnPick)speak(o);document.getElementById('checkBtn').disabled=false;};
    box.appendChild(b);
  });
  L.correct=correct;
}
function pickChip(btn){
  if(L.answered)return;const az=document.getElementById('azone');
  if(btn.parentElement.id==='bank'){btn.classList.add('used');
    const c=document.createElement('button');c.className='chip';c.textContent=btn.dataset.w;c.dataset.src=btn.dataset.i;
    c.onclick=()=>{if(L.answered)return;document.querySelector(`#bank .chip[data-i="${c.dataset.src}"]`).classList.remove('used');c.remove();updateBankState();};
    az.appendChild(c);}updateBankState();
}
function updateBankState(){const az=document.getElementById('azone');document.getElementById('checkBtn').disabled=az.children.length===0;}

function onCheck(){
  const btn=document.getElementById('checkBtn');
  if(L.answered){L.i++;if(L.hearts<=0){failLesson();return;}if(L.i>=L.ex.length){finishLesson();return;}renderEx();return;}
  const e=L.ex[L.i];let ok=false,ansFr='',ansMean='';
  if(e.type==='bank'){
    const got=[...document.getElementById('azone').children].map(c=>c.textContent).join(' ');
    ok=got.toLowerCase()===e.s.fr.toLowerCase();ansFr=e.s.fr;ansMean=e.s.en;
    document.querySelectorAll('#opts .opt').forEach(x=>{});
  }else{
    ok=L.sel===L.correct;ansFr=e.pair[0];ansMean=meaning(e.pair);
    document.querySelectorAll('#opts .opt').forEach(x=>{if(x.dataset.v===L.correct)x.classList.add('right');else if(x.dataset.v===L.sel&&!ok)x.classList.add('wrong');});
  }
  L.answered=true;
  const fb=document.getElementById('feedback');
  if(ok){L.right++;fb.className='feedback good';
    fb.innerHTML=`✓ ${t('correct')}<br><b>${ansFr}</b> = ${ansMean}`;coinSound();}
  else{L.wrong++;L.hearts--;fb.className='feedback bad';
    fb.innerHTML=`✗ ${t('notQuite')}<br>${t('youSaid')} "${L.sel||'—'}"<br><small>${t('answer')}: <b>${ansFr}</b> = ${ansMean}</small>`;downSound();
    document.getElementById('lhearts').textContent='❤️ '+L.hearts;}
  btn.textContent=t('cont');btn.classList.add('continue');btn.disabled=false;
}
function coinSound(){try{const ctx=coinSound.ctx||(coinSound.ctx=new(window.AudioContext||window.webkitAudioContext)());
  [{f:988,t:0},{f:1319,t:.09}].forEach(({f,t})=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
  o.frequency.value=f;o.type='square';g.gain.setValueAtTime(.0001,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.14,ctx.currentTime+t+.01);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.18);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.2);});}catch(e){}}
function downSound(){try{const ctx=downSound.ctx||(downSound.ctx=new(window.AudioContext||window.webkitAudioContext)());
  [{f:392,t:0},{f:262,t:.12}].forEach(({f,t})=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
  o.frequency.value=f;o.type='square';g.gain.setValueAtTime(.12,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.22);
  o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.24);});}catch(e){}}
function finishLesson(){
  const key=lessonKey(L.ui,L.li);const firstTime=!S.done[key];
  const gained=(firstTime?20:10)+L.right*2;
  S.done[key]=true;S.coin+=gained;bumpStreak();save();
  document.getElementById('lessonView').style.display='none';document.getElementById('checkBar').style.display='none';
  document.getElementById('resultView').style.display='block';
  document.getElementById('resEmoji').textContent='🐈‍⬛';
  document.getElementById('resTitle').textContent=t('lessonComplete');
  document.getElementById('resSub').textContent=t('nightYours');
  document.getElementById('resXP').textContent='+'+gained;
  document.getElementById('lblXP').textContent=t('lblXP');
  document.getElementById('lblAcc').textContent=t('lblAcc');
  document.getElementById('lblStreak').textContent=t('lblStreak');
  const acc=Math.round(L.right/(L.right+L.wrong||1)*100);
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resStreak').textContent=S.streak;
  refreshStats();confetti();
}
function failLesson(){
  document.getElementById('lessonView').style.display='none';document.getElementById('checkBar').style.display='none';
  document.getElementById('resultView').style.display='block';
  document.getElementById('resEmoji').textContent='😿';
  document.getElementById('resTitle').textContent=t('outHearts');
  document.getElementById('resSub').textContent=t('tryAgain');
  document.getElementById('lblXP').textContent=t('lblXP');document.getElementById('lblAcc').textContent=t('lblAcc');document.getElementById('lblStreak').textContent=t('lblStreak');
  document.getElementById('resXP').textContent='+0';
  const acc=Math.round(L.right/(L.right+L.wrong||1)*100);
  document.getElementById('resAcc').textContent=acc+'%';document.getElementById('resStreak').textContent=S.streak;
}
function confetti(){const emo=['🌙','⭐','🪙','🍄','🌟','🗼'];
  for(let i=0;i<28;i++){const e=document.createElement('div');e.className='confetti';e.textContent=emo[Math.floor(Math.random()*emo.length)];
  e.style.left=Math.random()*100+'vw';e.style.animationDuration=(1.5+Math.random()*2)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),3800);}}

/* ================= MASCOT / INSTALL ================= */
function mascotTalk(){const b=document.getElementById('bubble');b.textContent=t('mascot')[Math.floor(Math.random()*t('mascot').length)];
  b.classList.add('show');clearTimeout(mascotTalk.t);mascotTalk.t=setTimeout(()=>b.classList.remove('show'),4200);}
const INSTALL={ios:I18N[LANG].ios,android:I18N[LANG].android};
function openInstall(){document.getElementById('installModal').classList.add('show');applyInstallLang();}
function closeInstall(){document.getElementById('installModal').classList.remove('show');}
function setPlatform(p,tab){document.querySelectorAll('.im-tab').forEach(t=>t.classList.remove('active'));if(tab)tab.classList.add('active');
  document.getElementById('imBody').innerHTML=I18N[LANG][p].map((s,i)=>
    `<div class="im-step"><div class="im-num">${i+1}</div><div class="im-ico">${s.ico}</div><div class="im-text">${s.t}</div></div>`).join('');}
function applyInstallLang(){document.getElementById('imTitle').textContent=t('installTitle');document.getElementById('imSub').textContent=t('installSub');
  document.getElementById('imFoot').textContent=t('alreadyInstalled');setPlatform('ios',document.getElementById('imTabIos'));}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInstall();});

/* ================= LANGUAGE SWITCHER ================= */
function cycleLang(){const i=LANGS.indexOf(LANG);LANG=LANGS[(i+1)%LANGS.length];localStorage.setItem('minuit_lang',LANG);
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  toast('🌐 '+t('langName'));
  document.getElementById('a2hsTxt').textContent=t('a2hs');
  renderPath();
  if(document.getElementById('lessonView').style.display==='block')renderEx();
  if(document.getElementById('installModal').classList.contains('show'))applyInstallLang();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1600);}

/* ================= SPLASH / A2HS ================= */
const isIOS=/iP(hone|ad|od)/.test(navigator.platform)||(/Mac/.test(navigator.platform)&&navigator.maxTouchPoints>1);
const isInStandalone=('standalone' in navigator)&&navigator.standalone;
window.addEventListener('load',()=>{
  document.getElementById('langBtn').textContent=LANG.toUpperCase();
  document.getElementById('a2hsTxt').textContent=t('a2hs');
  setTimeout(()=>document.getElementById('splash').classList.add('hide'),650);
  if(isIOS&&!isInStandalone&&!localStorage.getItem('minuit_a2hs'))setTimeout(()=>{document.getElementById('a2hs').style.display='flex';},1400);
});

/* ================= PWA ================= */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

renderPath();
setTimeout(mascotTalk,1200);
document.addEventListener('keydown',e=>{
  if(document.getElementById('lessonView').style.display!=='block')return;
  if(/^[1-4]$/.test(e.key)){const o=document.querySelectorAll('#opts .opt')[+e.key-1];if(o)o.click();}
  if(e.key==='Enter'){const b=document.getElementById('checkBtn');if(!b.disabled)b.click();}
});
</script>
</body>
</html>

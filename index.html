<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MINUIT — Learn French</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#e52521">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MINUIT">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Press+Start+2P&family=Noto+Sans+JP:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#8ecbff;--sky2:#dff1ff;--ground:#c8743a;--groundln:#a85f25;
  --block:#f7c948;--blkEdge:#b5740f;--pipe:#3bbf57;--pipeD:#2a9e44;
  --red:#e52521;--coin:#ffd24a;--ink:#2b2440;--mut:#7a6f96;
  --panel:#fff7e6;--pnl2:#ffe9c2;--bord:#d8ab5e;--blue:#4f86ff;--green:#3bbf57;--rd:#e52521;
  --rad:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{color:var(--ink);min-height:100vh;font-family:"Baloo 2","Noto Sans JP","Noto Sans SC",system-ui,sans-serif;overflow-x:hidden;
  background:radial-gradient(circle at 16% 10%,#fff 0 5px,transparent 6px),radial-gradient(circle at 20% 10%,#fff 0 12px,transparent 13px),radial-gradient(circle at 78% 16%,#fff 0 4px,transparent 5px),radial-gradient(circle at 82% 16%,#fff 0 10px,transparent 11px),linear-gradient(180deg,var(--sky),var(--sky2) 60%,#eaf7ff);}
#ground{position:fixed;left:0;right:0;bottom:0;height:40px;z-index:0;pointer-events:none;background:repeating-linear-gradient(90deg,var(--ground) 0 30px,var(--groundln) 30px 32px),var(--ground);border-top:4px solid #8a4f1e;box-shadow:inset 0 3px 0 rgba(255,255,255,.25)}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 14px 120px}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:8px;padding:10px 2px}
.logo{font-family:"Press Start 2P",monospace;font-size:.82rem;color:var(--red);text-shadow:1px 1px 0 #fff,2px 2px 0 #b51410}
.logo b{color:var(--blue);text-shadow:1px 1px 0 #fff,2px 2px 0 #1d4fb5}
.spc{flex:1}
.pill{display:flex;align-items:center;gap:3px;font-weight:800;background:var(--panel);border:2px solid var(--bord);border-radius:11px;padding:4px 9px;box-shadow:0 2px 0 #b98a3e;font-size:.9rem}
.pill .lab{font-size:.52rem;color:var(--mut);font-weight:800;text-transform:uppercase}
.streak{color:#ff7a00}.coin{color:#b5860a}
.lang{background:var(--red);border:2px solid #b51410;color:#fff;font-family:"Press Start 2P",monospace;font-size:.6rem;padding:8px 9px;border-radius:11px;cursor:pointer;box-shadow:0 2px 0 #7d0e0b}
.lang:active{transform:translateY(2px);box-shadow:none}

h2.unit{margin:20px 0 3px;font-family:"Press Start 2P",monospace;font-size:.62rem;color:#fff;text-shadow:2px 2px 0 var(--pipeD);display:flex;align-items:center;gap:8px}
h2.unit::after{content:"";flex:1;height:4px;background:repeating-linear-gradient(90deg,var(--block) 0 7px,var(--blkEdge) 7px 11px);border-radius:3px}
.desc{color:#3a3357;font-weight:700;font-size:.8rem;margin-bottom:12px;text-shadow:0 1px 0 #fff}
.path{display:flex;flex-direction:column;gap:24px;padding:6px 0}
.node{width:64px;height:64px;border-radius:13px;position:relative;cursor:pointer;background:linear-gradient(180deg,var(--block),#f3b322);border:3px solid var(--blkEdge);box-shadow:inset 0 -6px 0 var(--block),0 5px 0 #8a5a0e;display:flex;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace;font-size:1.3rem;color:#7a4a08;align-self:center}
.node:nth-child(3n+1){align-self:flex-start;margin-left:13%}
.node:nth-child(3n){align-self:flex-end;margin-right:13%}
.node:active{transform:translateY(3px);box-shadow:inset 0 -6px 0 var(--block),0 2px 0 #8a5a0e}
.node.done{background:radial-gradient(circle at 38% 32%,#fff3b0,var(--coin));color:#b5860a}
.node.done .q{display:none}.node.done::after{content:"★";font-size:1.5rem}
.node.next{background:linear-gradient(180deg,var(--red),#c01612);color:#fff;border-color:#7d0e0b;box-shadow:inset 0 -6px 0 #9c100d,0 5px 0 #6e0b08,0 0 14px 2px rgba(255,210,74,.8);animation:bob 1.4s infinite}
.node.next .q{color:#fff;text-shadow:1px 1px 0 #7d0e0b}
.node.locked{filter:grayscale(.85) brightness(.85);opacity:.7;cursor:not-allowed}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px}}
.node .lab{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:.66rem;font-weight:800;color:#3a3357;white-space:nowrap;text-shadow:0 1px 0 #fff}
.node.next .lab{color:var(--red)}
.node .crn{position:absolute;top:-13px;right:-7px;font-size:1rem;animation:sp 3s infinite linear}
@keyframes sp{to{transform:rotate(360deg)}}

.mascot{position:fixed;bottom:50px;right:14px;font-size:2.3rem;z-index:30;cursor:pointer;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));transition:transform .2s}
.mascot:hover{transform:scale(1.12) rotate(-8deg)}
.bub{position:fixed;bottom:120px;right:16px;z-index:30;background:var(--panel);border:2px solid var(--bord);padding:8px 12px;border-radius:13px 13px 3px 13px;font-size:.78rem;max-width:210px;font-weight:700;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;box-shadow:0 3px 0 #b98a3e}
.bub.show{opacity:1;transform:none}

.lessonTop{display:flex;align-items:center;gap:10px;padding:12px 0}
.quit{background:var(--panel);border:2px solid var(--bord);border-radius:10px;color:var(--ink);font-size:1.1rem;width:36px;height:36px;cursor:pointer;font-weight:900;box-shadow:0 2px 0 #b98a3e}
.quit:active{transform:translateY(2px);box-shadow:none}
.lbar{flex:1;height:13px;background:var(--panel);border:2px solid var(--bord);border-radius:99px;overflow:hidden;box-shadow:inset 0 2px 0 rgba(0,0,0,.08)}
.lfill{height:100%;width:0;background:repeating-linear-gradient(90deg,var(--green) 0 8px,var(--pipeD) 8px 11px);transition:width .4s cubic-bezier(.3,1.3,.5,1)}
.lhearts{font-weight:900;color:var(--rd);font-size:1rem}
.type{font-family:"Press Start 2P",monospace;color:#fff;text-shadow:2px 2px 0 var(--pipeD);font-size:.55rem;text-transform:uppercase;margin:12px 0 6px}
.prompt{font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--ink)}
.hb{background:var(--red);border:2px solid #b51410;color:#fff;font-size:1.1rem;width:46px;height:46px;cursor:pointer;border-radius:12px;box-shadow:0 3px 0 #7d0e0b}
.hb:active{transform:translateY(3px);box-shadow:none}
.pron{color:#5a4f7a;font-style:italic;font-weight:700;font-size:.82rem;margin-bottom:12px}
.opts{display:grid;gap:9px;margin:14px 0}
.opt{background:var(--panel);border:2px solid var(--bord);border-bottom-width:4px;color:var(--ink);padding:12px 13px;border-radius:var(--rad);cursor:pointer;font-size:.98rem;font-weight:800;text-align:left;display:flex;gap:10px;align-items:center;transition:.12s}
.opt .k{width:24px;height:24px;border:2px solid var(--bord);border-radius:7px;color:var(--mut);display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;background:var(--pnl2);font-family:"Press Start 2P",monospace}
.opt:hover{border-color:var(--blue);background:var(--pnl2);transform:translateY(-1px)}
.opt.sel{border-color:var(--blue);background:#dcebff}
.opt.right{border-color:var(--green);background:#dff7e6;animation:pp .35s}
.opt.wrong{border-color:var(--rd);background:#ffe0df;animation:sh .35s}
@keyframes pp{50%{transform:scale(1.03)}}@keyframes sh{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.azone{min-height:50px;border:2px dashed var(--bord);border-radius:var(--rad);background:var(--panel);display:flex;gap:6px;flex-wrap:wrap;padding:8px;margin:14px 0 18px}
.bank{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--block);border:2px solid var(--blkEdge);border-bottom-width:4px;color:#7a4a08;padding:7px 12px;border-radius:11px;cursor:pointer;font-weight:800;font-size:.92rem;transition:.12s}
.chip:hover{transform:translateY(-1px)}.chip.used{opacity:.25;pointer-events:none}
.azone .chip{background:var(--blue);border-color:#1d4fb5;color:#fff}
.tin{width:100%;background:var(--panel);border:2px solid var(--bord);border-radius:var(--rad);color:var(--ink);padding:12px;font-size:1rem;margin:14px 0;outline:none;font-family:inherit;font-weight:700}
.tin:focus{border-color:var(--blue)}
.bar{position:fixed;bottom:0;left:0;right:0;z-index:45;padding:11px;background:var(--panel);border-top:3px solid var(--bord)}
.bin{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:10px}
.fb{flex:1;font-weight:800;font-size:.85rem;display:none;line-height:1.25}
.fb.g{display:block;color:var(--green)}.fb.b{display:block;color:var(--rd)}
.fb small{display:block;font-weight:700;color:#5a4f7a;font-size:.72rem;margin-top:1px}
.btn{background:var(--green);border:2px solid #1d7a3a;color:#053b18;font-family:"Press Start 2P",monospace;font-size:.62rem;letter-spacing:1px;padding:12px 20px;border-radius:13px;cursor:pointer;box-shadow:0 3px 0 #14632e;transition:.12s;text-transform:uppercase;margin-left:auto}
.btn:disabled{background:#cbd5e0;border-color:#9aa6b2;color:#7a8694;box-shadow:0 3px 0 #8492a0;cursor:not-allowed}
.btn:not(:disabled):active{transform:translateY(3px);box-shadow:none}
.btn.con{background:var(--coin);border-color:#b5860a;color:#5a3f00;box-shadow:0 3px 0 #8a6608}
#lessonView,#resultView{display:none}
.res{text-align:center;padding-top:6vh}
.resE{font-size:3.6rem;animation:bob 1.4s infinite}
.res h2{font-family:"Press Start 2P",monospace;font-size:.8rem;margin:12px 0 5px;color:var(--red);text-shadow:2px 2px 0 #fff}
.res p{color:#3a3357;font-weight:700;margin-bottom:18px;font-size:.85rem}
.rst{display:flex;gap:9px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.rbox{background:var(--panel);border:2px solid var(--bord);border-radius:var(--rad);padding:11px 14px;min-width:90px;box-shadow:0 3px 0 #b98a3e}
.rbox .n{font-size:1.2rem;font-weight:900;font-family:"Press Start 2P",monospace}
.rbox .t{font-size:.52rem;color:var(--mut);font-weight:800;text-transform:uppercase;margin-top:5px}

#splash{position:fixed;inset:0;z-index:999;background:linear-gradient(180deg,var(--sky),var(--sky2));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sc{font-size:4rem;filter:drop-shadow(0 5px 12px rgba(0,0,0,.3));animation:pin .6s cubic-bezier(.3,1.5,.5,1)}
.sm{font-size:1.8rem;animation:tw 2.4s infinite alternate;margin-top:-8px}
@keyframes tw{from{transform:scale(1)}to{transform:scale(1.15) rotate(8deg)}}
@keyframes pin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.sn{font-family:"Press Start 2P",monospace;font-size:1.1rem;color:var(--red);text-shadow:1px 1px 0 #fff,2px 2px 0 #b51410}
.sn b{color:var(--blue);text-shadow:1px 1px 0 #fff,2px 2px 0 #1d4fb5}

#a2hs{position:fixed;left:0;right:0;top:0;z-index:300;background:var(--red);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:.8rem;font-weight:800;box-shadow:0 3px 12px rgba(0,0,0,.3);animation:sd .4s ease}
@keyframes sd{from{transform:translateY(-100%)}to{transform:none}}
.a2i{font-size:1.3rem;flex:none}.a2x{background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;opacity:.85;flex:none}

.modal{position:fixed;inset:0;z-index:400;background:rgba(20,12,40,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex;animation:fi .25s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.card{background:var(--panel);border:3px solid var(--bord);border-radius:18px;width:min(360px,100%);max-height:84vh;overflow-y:auto;position:relative;padding:18px 16px 16px;animation:pp .35s cubic-bezier(.3,1.4,.5,1);box-shadow:0 6px 0 #b98a3e}
.cls{position:absolute;top:11px;right:13px;background:var(--red);border:2px solid #b51410;color:#fff;width:26px;height:26px;border-radius:8px;font-size:.9rem;cursor:pointer;font-weight:900}
.ct{font-family:"Press Start 2P",monospace;font-size:.72rem;color:var(--red);margin-bottom:13px;padding-right:28px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lo{display:flex;align-items:center;gap:9px;background:var(--pnl2);border:2px solid var(--bord);border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800;font-size:.9rem;transition:.12s;color:var(--ink)}
.lo:hover{transform:translateY(-1px);border-color:var(--blue)}
.lo.on{background:var(--blue);color:#fff;border-color:#1d4fb5}
.lo .fl{font-size:1.4rem;line-height:1}.lo .nm{display:flex;flex-direction:column;line-height:1.05}
.lo .nm small{font-size:.58rem;color:var(--mut);font-weight:700}
.lo.on .nm small{color:#dcebff}
.itabs{display:flex;gap:7px;margin-bottom:13px}
.itab{flex:1;background:var(--pnl2);border:2px solid var(--bord);color:#5a4f7a;padding:9px;border-radius:11px;cursor:pointer;font-weight:800;font-size:.8rem}
.itab.on{background:var(--red);color:#fff;border-color:#7d0e0b}
.istep{display:flex;gap:10px;align-items:flex-start;padding:9px 2px;border-bottom:2px dashed var(--bord)}
.istep:last-child{border-bottom:none}
.inum{flex:none;width:26px;height:26px;border-radius:7px;background:var(--coin);color:#5a3f00;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-family:"Press Start 2P",monospace;border:2px solid #b5860a}
.iico{font-size:1.3rem}.itext{flex:1;line-height:1.35;font-size:.82rem;font-weight:700}
.itext b{color:var(--red)}
.ifoot{text-align:center;color:#5a4f7a;font-weight:700;font-size:.7rem;margin-top:10px}

#toast{position:fixed;left:50%;top:16%;transform:translateX(-50%) translateY(-20px);z-index:500;background:var(--ink);color:#fff;padding:9px 16px;border-radius:12px;font-weight:800;font-size:.82rem;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.conf{position:fixed;top:-14px;font-size:1.2rem;z-index:200;animation:fl linear forwards;pointer-events:none}
@keyframes fl{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="ground"></div>
<div id="splash"><div class="sc">🐈‍⬛</div><div class="sm">🌙</div><div class="sn">MIN<b>UIT</b></div></div>
<div id="a2hs" style="display:none"><div class="a2i">📲</div><div class="a2x" onclick="document.getElementById('a2hs').style.display='none';localStorage.setItem('minuit_a2hs','1')">✕</div><div id="a2ht"></div></div>

<div id="app">
  <div class="topbar">
    <div class="logo">MIN<b>UIT</b>🌙</div>
    <div class="spc"></div>
    <div class="pill streak"><span>🔥</span><span id="stStreak">0</span></div>
    <div class="pill coin"><span>🪙</span><span id="stCoin">0</span></div>
    <button class="lang" id="langBtn" onclick="openLang()">EN</button>
  </div>
  <div id="pathView"></div>
  <div id="lessonView">
    <div class="lessonTop"><button class="quit" onclick="quitLesson()">✕</button><div class="lbar"><div class="lfill" id="lfill"></div></div><div class="lhearts" id="lhearts">❤️ 5</div></div>
    <div id="exArea"></div>
  </div>
  <div id="resultView" class="res">
    <div class="resE" id="resE">🐈‍⬛</div>
    <h2 id="resT">Leçon terminée !</h2><p id="resP">The Paris night is yours.</p>
    <div class="rst">
      <div class="rbox"><div class="n" style="color:var(--blue)" id="resXP">+0</div><div class="t" id="lXP">STARS</div></div>
      <div class="rbox"><div class="n" style="color:var(--green)" id="resA">0%</div><div class="t" id="lA">ACC</div></div>
      <div class="rbox"><div class="n" style="color:#ff7a00" id="resS">0</div><div class="t" id="lS">STREAK</div></div>
    </div>
    <button class="btn con" onclick="backToPath()">CONTINUE</button>
  </div>
  <div class="bub" id="bub"></div>
  <div class="mascot" id="mascot" onclick="openInstall()">🐈‍⬛</div>
  <div class="bar" id="checkBar" style="display:none"><div class="bin"><div class="fb" id="fb"></div><button class="btn" id="checkBtn" disabled onclick="onCheck()">CHECK</button></div></div>
</div>

<!-- LANGUAGE MODAL -->
<div class="modal" id="langModal" onclick="if(event.target===this)closeLang()">
  <div class="card"><button class="cls" onclick="closeLang()">✕</button><div class="ct" id="langTitle">Language</div><div class="lgrid" id="lgrid"></div></div>
</div>
<!-- INSTALL MODAL -->
<div class="modal" id="installModal" onclick="if(event.target===this)closeInstall()">
  <div class="card"><button class="cls" onclick="closeInstall()">✕</button><div class="ct" id="iTitle">Install MINUIT</div><div class="itext" id="iSub" style="font-weight:700;font-size:.75rem;color:#5a4f7a;margin-bottom:12px"></div>
    <div class="itabs"><button class="itab on" id="tIos" onclick="setPlat('ios',this)">📱 iPhone</button><button class="itab" id="tAnd" onclick="setPlat('android',this)">🤖 Android</button></div>
    <div id="iBody"></div><div class="ifoot" id="iFoot"></div></div>
</div>
<div id="toast"></div>

<script>
/* ===== i18n ===== */
const I18N={
  en:{unit:"UNIT",toEn:"Translate to English",toFr:"Translate to French",listen:"What do you hear?",build:"Build the sentence",
    check:"CHECK",cont:"CONTINUE",right:"Correct!",wrong:"Not quite",ans:"Answer",said:"You said",done:"Lesson complete!",night:"The Paris night is yours.",
    lXP:"STARS",lA:"ACCURACY",lS:"STREAK",oh:"Out of hearts!",retry:"Out of hearts — but the night is long. Try again!",
    inTitle:"Install MINUIT",inSub:"Your Paris-night French app — free, offline, no App Store",installed:"Already installed? Open it from your home screen. 🌙",
    a2h:"Install MINUIT: tap Share ⤴ then “Add to Home Screen”",ln:"English",
    mascot:["15 min a night keeps the streak alive. 🌙","Say answers out loud — your mouth learns too!","Tip: 'Je voudrais' + pointing = survive in France.","The night is dark and full of verbs. ⚡","Streaks count after midnight... or any time.","Open the install guide — tap me, then 'Add to Home Screen'. 📲"],
    ios:[{i:"🌐",t:"Open <b>minuit</b> in <b>Safari</b> — this guide only works in Safari."},{i:"⤴️",t:"Tap <b>Share</b> (square with up-arrow) at the bottom."},{i:"📲",t:"Scroll and tap <b>“Add to Home Screen”</b>."},{i:"✏️",t:"Keep name <b>MINUIT</b> and tap <b>Add</b> top-right."},{i:"🌙",t:"Close Safari. The <b>MINUIT</b> icon is on your home screen — fullscreen, offline."}],
    android:[{i:"🌐",t:"Open <b>minuit</b> in <b>Chrome</b>."},{i:"⋮",t:"Tap <b>⋮ menu</b> (three dots) top-right."},{i:"➕",t:"Tap <b>“Install app”</b>."},{i:"✔️",t:"Confirm <b>Install</b>."},{i:"🌙",t:"The <b>MINUIT</b> icon is on your home screen — like a native app, offline."}]},
  fr:{unit:"UNITÉ",toEn:"Traduisez en anglais",toFr:"Traduisez en français",listen:"Queentendez-vous ?",build:"Construisez la phrase",
    check:"VÉRIFIER",cont:"CONTINUER",right:"Correct !",wrong:"Pas tout à fait",ans:"Réponse",said:"Vous avez dit",done:"Leçon terminée !",night:"La nuit de Paris est à vous.",
    lXP:"ÉTOILES",lA:"PRÉCISION",lS:"SÉRIE",oh:"Plus de cœurs...",retry:"Plus de cœurs — mais la nuit est longue. Réessayez !",
    inTitle:"Installer MINUIT",inSub:"Votre appli de français — gratuite, hors ligne, sans App Store",installed:"Déjà installée ? Ouvrez-la depuis l'écran d'accueil. 🌙",

/* ===== state ===== */
const S=JSON.parse(localStorage.getItem("minuit")||"{}");
S.coin=S.coin||0;S.done=S.done||{};S.streak=S.streak||0;S.lastDay=S.lastDay||null;
function save(){localStorage.setItem("minuit",JSON.stringify(S));}
function today(){return new Date().toISOString().slice(0,10);}
function bump(){const t=today();if(S.lastDay===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;save();}
function refresh(){document.getElementById("stCoin").textContent=S.coin;document.getElementById("stStreak").textContent=S.streak;}

let fv=null, SPEECH=false;
function pick(){if(!SPEECH)return;const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith("fr"));fv=v.find(x=>/Thomas|Amélie|Audrey|Google/i.test(x.name))||v[0]||null;}
if("speechSynthesis" in window){SPEECH=true;speechSynthesis.onvoiceschanged=pick;pick();}
function spk(t){if(!SPEECH)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[?!]/g,""));u.lang="fr-FR";if(fv)u.voice=fv;u.rate=.85;speechSynthesis.speak(u);}

/* ===== helpers ===== */
function shuf(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[1]).map(p=>p[1]);}
const ALL=COURSE.flatMap(u=>u.lessons.flatMap(l=>l.p));
function dist(correct,n,f){const o=[];for(const p of shuf(ALL)){const v=f===2?p[2]:p[0];if(v!==correct&&!o.includes(v)){o.push(v);if(o.length===n)break;}}return o;}
function lk(u,l){return u+"_"+l;}
function esc(s){return s.replace(/'/g,"\\'");}

/* ===== path ===== */
const pv=document.getElementById("pathView");
function renderPath(){
  pv.innerHTML="";let next=false;
  COURSE.forEach((unit,ui)=>{
    const h=document.createElement("div");h.className="unit";h.textContent="✶ "+T("unit")+" "+unit.u;
    const d=document.createElement("div");d.className="desc";d.textContent=unit.desc||"";
    const path=document.createElement("div");path.className="path";
    unit.lessons.forEach((les,li)=>{
      const key=lk(ui,li),done=!!S.done[key],n=document.createElement("div");
      let c="node";if(done)c+=" done";else if(!next){c+=" next";next=true;}else c+=" locked";
      n.className=c;n.innerHTML=`<span class="q">?</span><span class="lab">${les.n}</span>${done?'<span class="crn">👑</span>':''}`;
      if(!n.classList.contains("locked"))n.onclick=()=>start(ui,li);
      path.appendChild(n);
    });
    pv.append(h,d,path);
  });
  refresh();
}

/* ===== lesson ===== */
let L=null;
function start(ui,li){
  const les=COURSE[ui].lessons[li];
  const ex=[];shuf(les.p).forEach((p,i)=>{const ty=i%3;ex.push(ty===0?{t:"fr2en",p}:ty===1?{t:"listen",p}:{t:"en2fr",p});});
  les.s.forEach(s=>ex.push({t:"bank",s:{fr:s[0],en:s[1]}}));
  L={ui,li,ex:shuf(ex).slice(0,9),i:0,h:5,r:0,w:0,ans:false,sel:null};
  document.getElementById("pathView").style.display="none";
  document.getElementById("resultView").style.display="none";
  document.getElementById("lessonView").style.display="block";
  document.getElementById("checkBar").style.display="block";
  document.getElementById("mascot").style.display="none";
  rEx();
}
function quit(){document.getElementById("lessonView").style.display="none";document.getElementById("checkBar").style.display="none";document.getElementById("pathView").style.display="block";document.getElementById("mascot").style.display="block";speechSynthesis.cancel();}
function back(){quit();document.getElementById("resultView").style.display="none";renderPath();}
function rEx(){
  const e=L.ex[L.i],a=document.getElementById("exArea");
  L.ans=false;L.sel=null;
  document.getElementById("lfill").style.width=(L.i/L.ex.length*100)+"%";
  document.getElementById("lhearts").textContent="❤️ "+L.h;
  const fb=document.getElementById("fb");fb.className="fb";fb.innerHTML="";
  const btn=document.getElementById("checkBtn");btn.textContent=T("check");btn.disabled=true;btn.classList.remove("con");
  let h="";
  if(e.t==="fr2en"){h=`<div class="type">${T("toEn")}</div><div class="prompt">${e.p[0]} <button class="hb" onclick="spk('${esc(e.p[0])}')">🔊</button></div><div class="pron">${e.p[1]}</div><div class="opts" id="opts"></div>`;a.innerHTML=h;rOpts(shuf([mean(e.p),...dist(e.p[2],3,2)]),e.p[2],false);spk(e.p[0]);}
  else if(e.t==="en2fr"){h=`<div class="type">${T("toFr")}</div><div class="prompt">${mean(e.p)}</div><div class="opts" id="opts"></div>`;a.innerHTML=h;rOpts(shuf([e.p[0],...dist(e.p[0],3,0)]),e.p[0],true);}
  else if(e.t==="listen"){h=`<div class="type">${T("listen")}</div><div class="prompt"><button class="hb" style="width:60px;height:60px;font-size:1.5rem" onclick="spk('${esc(e.p[0])}')">🔊</button> ${T("listen")}</div><div class="opts" id="opts"></div>`;a.innerHTML=h;rOpts(shuf([e.p[0],...dist(e.p[0],3,0)]),e.p[0],true);spk(e.p[0]);}
  else if(e.t==="bank"){const w=shuf(e.s.fr.split(" "));h=`<div class="type">${T("build")}</div><div class="prompt">“${e.s.en}”</div><div class="azone" id="azone"></div><div class="bank" id="bank">${w.map((x,i)=>`<button class="chip" data-w="${esc(x)}" data-i="${i}" onclick="pick(this)">${x}</button>`).join("")}</div>`;a.innerHTML=h;}
}
function rOpts(opts,correct,spkPick){
  const box=document.getElementById("opts");
  opts.forEach((o,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="k">${i+1}</span> ${o}`;b.dataset.v=o;
    b.onclick=()=>{if(L.ans)return;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");L.sel=o;if(spkPick)spk(o);document.getElementById("checkBtn").disabled=false;};
    box.appendChild(b);});
  L.correct=correct;
}
function pick(b){if(L.ans)return;const az=document.getElementById("azone");
  if(b.parentElement.id==="bank"){b.classList.add("used");const c=document.createElement("button");c.className="chip";c.textContent=b.dataset.w;c.dataset.s=b.dataset.i;
    c.onclick=()=>{if(L.ans)return;document.querySelector(`#bank .chip[data-i="${c.dataset.s}"]`).classList.remove("used");c.remove();uBank();};az.appendChild(c);}
  uBank();}
function uBank(){const az=document.getElementById("azone");document.getElementById("checkBtn").disabled=az.children.length===0;}

function onCheck(){
  const btn=document.getElementById("checkBtn");
  if(L.ans){L.i++;if(L.h<=0){fail();return;}if(L.i>=L.ex.length){fin();return;}rEx();return;}
  const e=L.ex[L.i];let ok=false,fr="",mn="";
  if(e.t==="bank"){const g=[...document.getElementById("azone").children].map(c=>c.textContent).join(" ");ok=g.toLowerCase()===e.s.fr.toLowerCase();fr=e.s.fr;mn=e.s.en;}
  else{ok=L.sel===L.correct;fr=e.p[0];mn=mean(e.p);
    document.querySelectorAll("#opts .opt").forEach(x=>{if(x.dataset.v===L.correct)x.classList.add("right");else if(x.dataset.v===L.sel&&!ok)x.classList.add("wrong");});}
  L.ans=true;const fb=document.getElementById("fb");
  if(ok){L.r++;fb.className="fb g";fb.innerHTML=`✓ ${T("right")}<br><b>${fr}</b> = ${mn}`;sfx([988,.09,1319,0]);}
  else{L.w++;L.h--;fb.className="fb b";fb.innerHTML=`✗ ${T("wrong")}<br>${T("said")} "${L.sel||"—"}"<br><small>${T("ans")}: <b>${fr}</b> = ${mn}</small>`;sfx([392,0,262,.12]);document.getElementById("lhearts").textContent="❤️ "+L.h;}
  btn.textContent=T("cont");btn.classList.add("con");btn.disabled=false;
}
function sfx(n){try{if(!("AudioContext" in window)&&!("webkitAudioContext" in window))return;const AC=window.AudioContext||window.webkitAudioContext;const c=sfx.c||(sfx.c=new AC());n.forEach(([f,t])=>{if(!f)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="square";g.gain.setValueAtTime(.0001,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.12,c.currentTime+t+.01);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.18);o.start(c.currentTime+t);o.stop(c.currentTime+t+.2);});}catch(e){}}
function fin(){const key=lk(L.ui,L.li),ft=!S.done[key],g=(ft?20:10)+L.r*2;S.done[key]=true;S.coin+=g;bump();save();
  showRes("🐈‍⬛",T("done"),T("night"),"+ "+g);}
function fail(){showRes("😿",T("oh"),T("retry"),"+0");}
function showRes(em,t,p,xp){document.getElementById("lessonView").style.display="none";document.getElementById("checkBar").style.display="none";
  document.getElementById("resultView").style.display="block";document.getElementById("resE").textContent=em;document.getElementById("resT").textContent=t;document.getElementById("resP").textContent=p;
  document.getElementById("resXP").textContent=xp;document.getElementById("lXP").textContent=T("lXP");document.getElementById("lA").textContent=T("lA");document.getElementById("lS").textContent=T("lS");
  const acc=Math.round(L.r/(L.r+L.w||1)*100);document.getElementById("resA").textContent=acc+"%";document.getElementById("resS").textContent=S.streak;refresh();conf();}
function conf(){const e=["🌙","⭐","🪙","🍄","🌟","🗼"];for(let i=0;i<26;i++){const c=document.createElement("div");c.className="conf";c.textContent=e[Math.floor(Math.random()*e.length)];c.style.left=Math.random()*100+"vw";c.style.animationDuration=(1.5+Math.random()*2)+"s";document.body.appendChild(c);setTimeout(()=>c.remove(),3800);}}

/* ===== mascot / modals ===== */
function mascotTalk(){const b=document.getElementById("bub");b.textContent=T("mascot")[Math.floor(Math.random()*T("mascot").length)];b.classList.add("show");clearTimeout(mascotTalk.t);mascotTalk.t=setTimeout(()=>b.classList.remove("show"),4000);}
function openInstall(){document.getElementById("installModal").classList.add("show");applyIn();}
function closeInstall(){document.getElementById("installModal").classList.remove("show");}
function setPlat(p,tab){document.querySelectorAll(".itab").forEach(t=>t.classList.remove("on"));if(tab)tab.classList.add("on");
  document.getElementById("iBody").innerHTML=I18N[LANG][p].map((s,i)=>`<div class="istep"><div class="inum">${i+1}</div><div class="iico">${s.i}</div><div class="itext">${s.t}</div></div>`).join("");}
function applyIn(){document.getElementById("iTitle").textContent=T("inTitle");document.getElementById("iSub").textContent=T("inSub");document.getElementById("iFoot").textContent=T("installed");setPlat("ios",document.getElementById("tIos"));}

/* ===== language ===== */
function openLang(){document.getElementById("langTitle").textContent=T("ln");
  document.getElementById("lgrid").innerHTML=LANGS.map(code=>`<button class="lo ${code===LANG?"on":""}" onclick="choose('${code}')"><span class="fl">${META[code][0]}</span><span class="nm">${META[code][1]}<small>${META[code][2]}</small></span></button>`).join("");
  document.getElementById("langModal").classList.add("show");}
function closeLang(){document.getElementById("langModal").classList.remove("show");}
function choose(code){LANG=code;localStorage.setItem("minuit_lang",LANG);document.getElementById("langBtn").textContent=LANG.toUpperCase();closeLang();toast(META[code][0]+" "+META[code][1]);document.getElementById("a2ht").textContent=T("a2h");renderPath();
  if(document.getElementById("lessonView").style.display==="block")rEx();
  if(document.getElementById("installModal").classList.contains("show"))applyIn();}
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove("show"),1600);}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeInstall();closeLang();}});

/* ===== splash / a2hs / pwa ===== */
const iOS=/iP(hone|ad|od)/.test(navigator.platform)||(/Mac/.test(navigator.platform)&&navigator.maxTouchPoints>1);
const stand=("standalone" in navigator)&&navigator.standalone;
function hideSplash(){document.getElementById("splash").classList.add("hide");}
function showA2hs(){if(iOS&&!stand&&!localStorage.getItem("minuit_a2hs"))document.getElementById("a2hs").style.display="flex";}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",()=>{setTimeout(hideSplash,500);setTimeout(showA2hs,1200);});}
else{setTimeout(hideSplash,500);setTimeout(showA2hs,1200);}
window.addEventListener("load",()=>{document.getElementById("langBtn").textContent=LANG.toUpperCase();document.getElementById("a2ht").textContent=T("a2h");});
// hard fallback: never let the splash trap the user
setTimeout(hideSplash,2500);
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});

renderPath();
setTimeout(mascotTalk,1100);
document.addEventListener("keydown",e=>{if(document.getElementById("lessonView").style.display!=="block")return;if(/^[1-4]$/.test(e.key)){const o=document.querySelectorAll("#opts .opt")[+e.key-1];if(o)o.click();}if(e.key==="Enter"){const b=document.getElementById("checkBtn");if(!b.disabled)b.click();}});
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MINUIT — Learn French Under the Paris Night Sky</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0b0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MINUIT">
<style>
:root{
  --night:#0b0e1a; --night2:#131730; --panel:#1a1f3d; --panel2:#222855;
  --border:#2e3566; --ink:#eef0ff; --muted:#8b91c7;
  --gold:#ffd166; --neon:#7c5cff; --pink:#ff5c9d; --green:#3ddc97; --red:#ff5c6c;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--night); color:var(--ink); min-height:100vh;
  font-family:"Avenir Next","Nunito","Segoe UI",system-ui,sans-serif;
  overflow-x:hidden;
}
/* starfield */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;opacity:.7;animation:twinkle 3s infinite alternate}
@keyframes twinkle{from{opacity:.15}to{opacity:.8}}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 16px 120px}

/* ===== top bar ===== */
#topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:14px 4px;background:linear-gradient(180deg,var(--night) 75%,transparent);
}
.logo{font-size:1.35rem;font-weight:900;letter-spacing:2px}
.logo .moon{margin-right:6px}
.logo span.m{color:var(--gold)}
.stat{display:flex;align-items:center;gap:5px;font-weight:800;font-size:.95rem}
.stat.streak{color:var(--gold)} .stat.xp{color:var(--neon)} .stat.hearts{color:var(--pink)}
.spacer{flex:1}

/* ===== path ===== */
#pathView h2.unit{
  margin:26px 0 6px;font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;
}
h2.unit::after{content:"";flex:1;height:1px;background:var(--border)}
.unitDesc{color:var(--muted);font-size:.85rem;margin-bottom:18px}
.path{display:flex;flex-direction:column;gap:26px;padding:6px 0 10px}
.node{
  width:86px;height:86px;border-radius:50%;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  background:var(--panel);border:4px solid var(--border);
  box-shadow:0 6px 0 #0d1128;transition:transform .15s;
  align-self:center;
}
.node:nth-child(3n+1){align-self:flex-start;margin-left:16%}
.node:nth-child(3n){align-self:flex-end;margin-right:16%}
.node:active{transform:translateY(4px);box-shadow:0 2px 0 #0d1128}
.node.done{background:linear-gradient(145deg,var(--gold),#ffb347);border-color:#ffe3a1;color:#4a3200}
.node.next{background:linear-gradient(145deg,var(--neon),#5a3cf0);border-color:#a794ff;animation:bounce 1.6s infinite}
.node.locked{opacity:.42;cursor:not-allowed;filter:grayscale(.6)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.node .label{
  position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  font-size:.68rem;color:var(--muted);white-space:nowrap;font-weight:700;letter-spacing:.5px;
}
.node.next .label{color:var(--ink)}
.node .crown{position:absolute;top:-14px;right:-6px;font-size:1.1rem;animation:twinkle 2s infinite alternate}
.mascot{
  position:fixed;bottom:18px;right:18px;font-size:2.6rem;z-index:30;cursor:pointer;
  filter:drop-shadow(0 4px 10px rgba(124,92,255,.5));transition:transform .2s;
}
.mascot:hover{transform:scale(1.15) rotate(-8deg)}
.bubble{
  position:fixed;bottom:86px;right:20px;z-index:30;background:var(--panel2);border:1px solid var(--border);
  padding:10px 14px;border-radius:14px 14px 2px 14px;font-size:.82rem;max-width:230px;
  opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;
}
.bubble.show{opacity:1;transform:none}

/* ===== lesson ===== */
#lessonView{display:none}
.lessonTop{display:flex;align-items:center;gap:12px;padding:16px 0}
.quit{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer}
.lbar{flex:1;height:14px;background:var(--panel);border-radius:99px;overflow:hidden}
.lfill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),#7ef7c6);border-radius:99px;transition:width .4s cubic-bezier(.3,1.3,.5,1)}
.lhearts{font-weight:800;color:var(--pink)}
.exType{color:var(--muted);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px}
.prompt{font-size:1.5rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hearBtn{
  background:var(--neon);border:none;border-radius:12px;color:#fff;font-size:1.3rem;
  width:52px;height:52px;cursor:pointer;box-shadow:0 4px 0 #4a35b8;transition:transform .1s;
}
.hearBtn:active{transform:translateY(3px);box-shadow:none}
.pron{color:var(--muted);font-style:italic;font-size:.9rem;margin-bottom:18px}
.opts{display:grid;gap:12px;margin:20px 0}
.opt{
  background:var(--panel);border:2px solid var(--border);border-bottom-width:4px;color:var(--ink);
  padding:16px;border-radius:var(--radius);cursor:pointer;font-size:1.05rem;font-weight:600;
  text-align:left;transition:all .15s;display:flex;gap:12px;align-items:center;
}
.opt .key{
  width:26px;height:26px;border:1px solid var(--border);border-radius:7px;color:var(--muted);
  display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;flex:none;
}
.opt:hover{border-color:var(--neon);background:var(--panel2);transform:translateY(-2px)}
.opt.sel{border-color:var(--neon);background:#241f55}
.opt.right{border-color:var(--green);background:rgba(61,220,151,.14);animation:pop .35s}
.opt.wrong{border-color:var(--red);background:rgba(255,92,108,.14);animation:shake .35s}
@keyframes pop{50%{transform:scale(1.03)}}
@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
/* word bank */
.answerZone{
  min-height:60px;border-bottom:2px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;
  padding:10px 2px;margin:16px 0 22px;
}
.bank{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  background:var(--panel);border:2px solid var(--border);border-bottom-width:4px;color:var(--ink);
  padding:10px 16px;border-radius:14px;cursor:pointer;font-weight:700;font-size:1rem;transition:all .15s;
}
.chip:hover{transform:translateY(-2px);border-color:var(--neon)}
.chip.used{opacity:.25;pointer-events:none}
.answerZone .chip{background:var(--panel2);border-color:var(--neon)}
/* type input */
.typeIn{
  width:100%;background:var(--panel);border:2px solid var(--border);border-radius:var(--radius);
  color:var(--ink);padding:16px;font-size:1.1rem;margin:16px 0;outline:none;font-family:inherit;
}
.typeIn:focus{border-color:var(--neon)}
/* check bar */
.checkBar{
  position:fixed;bottom:0;left:0;right:0;z-index:45;padding:16px;
  background:var(--night2);border-top:2px solid var(--border);
}
.checkInner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:14px}
.feedback{flex:1;font-weight:800;font-size:1.05rem;display:none}
.feedback.good{display:block;color:var(--green)}
.feedback.bad{display:block;color:var(--red)}
.feedback small{display:block;font-weight:600;color:var(--muted);font-size:.8rem}
.bigBtn{
  background:var(--green);border:none;color:#06301f;font-weight:900;font-size:1rem;letter-spacing:1px;
  padding:15px 34px;border-radius:16px;cursor:pointer;box-shadow:0 4px 0 #1d9c68;
  transition:all .15s;text-transform:uppercase;margin-left:auto;
}
.bigBtn:disabled{background:var(--panel);color:var(--muted);box-shadow:0 4px 0 #10132a;cursor:not-allowed}
.bigBtn:not(:disabled):active{transform:translateY(3px);box-shadow:none}
.bigBtn.continue{background:var(--gold);box-shadow:0 4px 0 #c79b2f;color:#4a3200}
/* results */
#resultView{display:none;text-align:center;padding-top:10vh}
.resEmoji{font-size:4.5rem;animation:bounce 1.4s infinite}
#resultView h2{font-size:1.8rem;margin:14px 0 6px}
#resultView p{color:var(--muted);margin-bottom:26px}
.resStats{display:flex;gap:14px;justify-content:center;margin-bottom:34px}
.resBox{background:var(--panel);border:2px solid var(--border);border-radius:var(--radius);padding:16px 22px;min-width:110px}
.resBox .n{font-size:1.5rem;font-weight:900}
.resBox .t{font-size:.72rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.confetti{position:fixed;top:-14px;font-size:1.3rem;z-index:200;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">

  <div id="topbar">
    <div class="logo"><span class="moon">🌙</span>MIN<span class="m">UIT</span></div>
    <div class="spacer"></div>
    <div class="stat streak">🔥 <span id="stStreak">0</span></div>
    <div class="stat xp">✦ <span id="stXP">0</span> XP</div>
  </div>

  <!-- ============ PATH ============ -->
  <div id="pathView"></div>

  <!-- ============ LESSON ============ -->
  <div id="lessonView">
    <div class="lessonTop">
      <button class="quit" onclick="quitLesson()">✕</button>
      <div class="lbar"><div class="lfill" id="lfill"></div></div>
      <div class="lhearts" id="lhearts">💜 5</div>
    </div>
    <div id="exArea"></div>
  </div>

  <!-- ============ RESULTS ============ -->
  <div id="resultView">
    <div class="resEmoji" id="resEmoji">🐈‍⬛</div>
    <h2 id="resTitle">Leçon terminée !</h2>
    <p id="resSub">The Paris night is yours.</p>
    <div class="resStats">
      <div class="resBox"><div class="n" style="color:var(--neon)" id="resXP">+0</div><div class="t">XP earned</div></div>
      <div class="resBox"><div class="n" style="color:var(--green)" id="resAcc">0%</div><div class="t">Accuracy</div></div>
      <div class="resBox"><div class="n" style="color:var(--gold)" id="resStreak">0</div><div class="t">Day streak</div></div>
    </div>
    <button class="bigBtn continue" onclick="backToPath()">Continue</button>
  </div>

  <div class="bubble" id="bubble"></div>
  <div class="mascot" id="mascot" onclick="mascotTalk()">🐈‍⬛</div>
  <div class="checkBar" id="checkBar" style="display:none">
    <div class="checkInner">
      <div class="feedback" id="feedback"></div>
      <button class="bigBtn" id="checkBtn" disabled onclick="onCheck()">Check</button>
    </div>
  </div>
</div>

<script>
/* ================= COURSE DATA ================= */
/* pair: [fr, pron, en]  |  sentence: {fr:"...", en:"..."} for word-bank */
const COURSE=[
 {unit:"Premiers Pas", desc:"Greetings & survival — your first steps into the night",
  lessons:[
   {icon:"👋",name:"Bonjour",pairs:[
     ["Bonjour","bohn-ZHOOR","Hello"],["Bonsoir","bohn-SWAHR","Good evening"],
     ["Salut","sah-LU","Hi (casual)"],["Au revoir","oh ruh-VWAHR","Goodbye"],
     ["Merci","mehr-SEE","Thank you"],["De rien","duh RYEHN","You're welcome"]],
    sentences:[{fr:"Bonjour je m'appelle Marie",en:"Hello my name is Marie"},{fr:"Merci beaucoup au revoir",en:"Thank you very much goodbye"}]},
   {icon:"🙏",name:"Politesse",pairs:[
     ["S'il vous plaît","seel voo PLEH","Please"],["Excusez-moi","ex-ku-zay MWAH","Excuse me"],
     ["Pardon","pahr-DOHN","Sorry"],["Oui","wee","Yes"],["Non","nohn","No"],
     ["Ça va ?","sah VAH","How's it going?"]],
    sentences:[{fr:"Excusez-moi s'il vous plaît",en:"Excuse me please"},{fr:"Oui ça va merci",en:"Yes I'm fine thank you"}]},
   {icon:"🆘",name:"Au secours",pairs:[
     ["Je ne comprends pas","zhuh nuh kohm-PRAHN pah","I don't understand"],
     ["Parlez-vous anglais ?","par-lay voo ahn-GLEH","Do you speak English?"],
     ["Plus lentement","plu lahnt-MAHN","Slower"],["Je suis perdu","zhuh swee pehr-DU","I'm lost"],
     ["J'ai besoin d'aide","zhay buh-zwehn DED","I need help"],["Au secours !","oh suh-KOOR","Help!"]],
    sentences:[{fr:"Je ne comprends pas parlez plus lentement",en:"I don't understand speak slower"},{fr:"Je suis perdu j'ai besoin d'aide",en:"I am lost I need help"}]},
  ]},
 {unit:"Café Culture", desc:"Order like a Parisian",
  lessons:[
   {icon:"☕",name:"Au café",pairs:[
     ["Je voudrais","zhuh voo-DREH","I would like"],["un café","uhn kah-FAY","a coffee"],
     ["de l'eau","duh LOH","some water"],["du vin","du VEHN","some wine"],
     ["une bière","un BYEHR","a beer"],["le menu","luh muh-NU","the menu"]],
    sentences:[{fr:"Je voudrais un café s'il vous plaît",en:"I would like a coffee please"},{fr:"Je voudrais de l'eau et le menu",en:"I would like some water and the menu"}]},
   {icon:"🥐",name:"La table",pairs:[
     ["Une table pour deux","un TAHBL poor DUH","A table for two"],
     ["L'addition","lah-dee-SYOHN","The check"],["C'est délicieux","seh day-lee-SYUH","It's delicious"],
     ["le pain","luh PEHN","the bread"],["le fromage","luh froh-MAHZH","the cheese"],
     ["J'ai faim","zhay FEHM","I'm hungry"]],
    sentences:[{fr:"Une table pour deux s'il vous plaît",en:"A table for two please"},{fr:"C'est délicieux l'addition s'il vous plaît",en:"It's delicious the check please"}]},
   {icon:"💶",name:"Payer",pairs:[
     ["C'est combien ?","seh kohm-BYEHN","How much is it?"],["trop cher","troh SHEHR","too expensive"],
     ["Je prends ça","zhuh prahn SAH","I'll take it"],["par carte","pahr KART","by card"],
     ["en espèces","ahn ess-PESS","in cash"],["l'argent","lar-ZHAHN","the money"]],
    sentences:[{fr:"C'est combien je prends ça",en:"How much is it I'll take it"},{fr:"Je voudrais payer par carte",en:"I would like to pay by card"}]},
  ]},
 {unit:"Verbes de Minuit", desc:"The power verbs that unlock 70% of speech",
  lessons:[
   {icon:"⚡",name:"Être & Avoir",pairs:[
     ["je suis","zhuh SWEE","I am"],["tu es","tu EH","you are"],
     ["il est","eel EH","he is"],["j'ai","zhay","I have"],
     ["tu as","tu AH","you have"],["nous avons","noo zah-VOHN","we have"]],
    sentences:[{fr:"Je suis fatigué et j'ai faim",en:"I am tired and I am hungry"},{fr:"Tu es mon ami",en:"You are my friend"}]},
   {icon:"🚀",name:"Aller & Faire",pairs:[
     ["je vais","zhuh VEH","I go / I'm going"],["tu vas","tu VAH","you go"],
     ["nous allons","noo zah-LOHN","we go"],["je fais","zhuh FEH","I do / make"],
     ["il fait","eel FEH","he does"],["On y va !","ohn ee VAH","Let's go!"]],
    sentences:[{fr:"Je vais au café ce soir",en:"I am going to the cafe tonight"},{fr:"Qu'est-ce que tu fais",en:"What are you doing"}]},
   {icon:"💪",name:"Vouloir & Pouvoir",pairs:[
     ["je veux","zhuh VUH","I want"],["tu veux","tu VUH","you want"],
     ["je peux","zhuh PUH","I can"],["je dois","zhuh DWAH","I must"],
     ["je sais","zhuh SEH","I know"],["Je veux partir","zhuh vuh par-TEER","I want to leave"]],
    sentences:[{fr:"Je veux aller à Paris",en:"I want to go to Paris"},{fr:"Je peux parler français",en:"I can speak French"}]},
  ]},
 {unit:"La Rue", desc:"Navigate the city after dark",
  lessons:[
   {icon:"🧭",name:"Directions",pairs:[
     ["à gauche","ah GOHSH","to the left"],["à droite","ah DRWAHT","to the right"],
     ["tout droit","too DRWAH","straight ahead"],["Où est... ?","oo EH","Where is...?"],
     ["près de","preh DUH","near"],["loin de","lwehn DUH","far from"]],
    sentences:[{fr:"Où est la gare s'il vous plaît",en:"Where is the station please"},{fr:"Tout droit puis à gauche",en:"Straight ahead then to the left"}]},
   {icon:"🏙️",name:"La ville",pairs:[
     ["la gare","lah GAHR","the station"],["l'hôtel","loh-TELL","the hotel"],
     ["la rue","lah RU","the street"],["la ville","lah VEEL","the city"],
     ["le métro","luh may-TROH","the metro"],["la nuit","lah NWEE","the night"]],
    sentences:[{fr:"L'hôtel est près de la gare",en:"The hotel is near the station"},{fr:"La ville est belle la nuit",en:"The city is beautiful at night"}]},
   {icon:"🕐",name:"Le temps",pairs:[
     ["aujourd'hui","oh-zhoor-DWEE","today"],["demain","duh-MEHN","tomorrow"],
     ["hier","yehr","yesterday"],["maintenant","mehnt-NAHN","now"],
     ["bientôt","byehn-TOH","soon"],["Quelle heure est-il ?","kel UHR eh-teel","What time is it?"]],
    sentences:[{fr:"On y va maintenant ou demain",en:"Do we go now or tomorrow"},{fr:"Quelle heure est-il maintenant",en:"What time is it now"}]},
  ]},
 {unit:"Le Passé", desc:"Tell stories — past tense unlocked",
  lessons:[
   {icon:"📸",name:"J'ai fait",pairs:[
     ["j'ai mangé","zhay mahn-ZHAY","I ate"],["j'ai fait","zhay FEH","I did"],
     ["j'ai vu","zhay VU","I saw"],["j'ai pris","zhay PREE","I took"],
     ["j'ai dit","zhay DEE","I said"],["j'ai eu","zhay U","I had"]],
    sentences:[{fr:"J'ai mangé au café hier",en:"I ate at the cafe yesterday"},{fr:"J'ai vu la ville la nuit",en:"I saw the city at night"}]},
   {icon:"🎥",name:"J'étais",pairs:[
     ["j'étais","zhay-TEH","I was"],["c'était","say-TEH","it was"],
     ["il faisait beau","eel fuh-zeh BOH","the weather was nice"],
     ["je suis allé","zhuh swee zah-LAY","I went"],["je suis parti","zhuh swee par-TEE","I left"],
     ["il y a deux ans","eel ee ah duh ZAHN","two years ago"]],
    sentences:[{fr:"Je suis allé à Paris il y a deux ans",en:"I went to Paris two years ago"},{fr:"C'était délicieux",en:"It was delicious"}]},
  ]},
 {unit:"Argot de Nuit", desc:"Street French — talk like a local",
  lessons:[
   {icon:"😎",name:"Le vrai parler",pairs:[
     ["Ouais","weh","Yeah"],["Du coup","du KOO","So / as a result"],
     ["Bref","brehf","Anyway"],["Carrément !","kah-ray-MAHN","Totally!"],
     ["C'est génial","seh zhay-NYAL","That's awesome"],["C'est nul","seh NUL","That sucks"]],
    sentences:[{fr:"Du coup on y va ce soir",en:"So we go tonight"},{fr:"Ouais c'est génial",en:"Yeah that's awesome"}]},
   {icon:"🤙",name:"Entre potes",pairs:[
     ["T'inquiète","tehn-KYET","Don't worry"],["Ça marche !","sah MARSH","That works!"],
     ["un truc","uhn TRUK","a thing"],["le boulot","luh boo-LOH","work (slang)"],
     ["Quoi de neuf ?","kwah duh NUHF","What's new?"],["Santé !","sahn-TAY","Cheers!"]],
    sentences:[{fr:"Quoi de neuf au boulot",en:"What's new at work"},{fr:"T'inquiète ça marche",en:"Don't worry that works"}]},
  ]},
];

/* ================= STATE ================= */
const S = JSON.parse(localStorage.getItem('minuit')||'{}');
S.xp=S.xp||0; S.done=S.done||{}; S.streak=S.streak||0; S.lastDay=S.lastDay||null;
function save(){localStorage.setItem('minuit',JSON.stringify(S))}
function today(){return new Date().toISOString().slice(0,10)}
function bumpStreak(){
  const t=today();
  if(S.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?S.streak+1:1; S.lastDay=t; save();
}
function refreshStats(){
  document.getElementById('stXP').textContent=S.xp;
  document.getElementById('stStreak').textContent=S.streak;
}

/* ================= SPEECH ================= */
let frVoice=null;
function pickVoice(){const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith('fr'));
  frVoice=v.find(x=>/Thomas|Amélie|Audrey|Google/i.test(x.name))||v[0]||null;}
speechSynthesis.onvoiceschanged=pickVoice; pickVoice();
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[?!]/g,''));
  u.lang='fr-FR';if(frVoice)u.voice=frVoice;u.rate=.85;speechSynthesis.speak(u);}

/* ================= STARS ================= */
(()=>{const s=document.getElementById('stars');
for(let i=0;i<70;i++){const d=document.createElement('div');d.className='star';
d.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*100}vh;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*3}s`;
s.appendChild(d);}})();

/* ================= PATH RENDER ================= */
const pathView=document.getElementById('pathView');
function lessonKey(u,l){return u+'_'+l}
function renderPath(){
  pathView.innerHTML='';
  let nextFound=false;
  COURSE.forEach((unit,ui)=>{
    const h=document.createElement('h2');h.className='unit';h.textContent=`✶ ${unit.unit}`;
    const d=document.createElement('p');d.className='unitDesc';d.textContent=unit.desc;
    const path=document.createElement('div');path.className='path';
    unit.lessons.forEach((les,li)=>{
      const key=lessonKey(ui,li);
      const done=!!S.done[key];
      const n=document.createElement('div');
      let cls='node';
      if(done)cls+=' done';
      else if(!nextFound){cls+=' next';nextFound=true;}
      else cls+=' locked';
      n.className=cls;
      n.innerHTML=`${les.icon}<span class="label">${les.name}</span>${done?'<span class="crown">👑</span>':''}`;
      if(!n.classList.contains('locked')) n.onclick=()=>startLesson(ui,li);
      path.appendChild(n);
    });
    pathView.append(h,d,path);
  });
  refreshStats();
}

/* ================= EXERCISE GEN ================= */
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1])}
const ALLPAIRS=COURSE.flatMap(u=>u.lessons.flatMap(l=>l.pairs));
function distractors(correct,n,field){
  const out=[];const pool=shuffle(ALLPAIRS);
  for(const p of pool){const v=field===2?p[2]:p[0];
    if(v!==correct&&!out.includes(v)){out.push(v);if(out.length===n)break;}}
  return out;
}
function buildExercises(les){
  const ex=[];
  shuffle(les.pairs).forEach((p,i)=>{
    const t=i%3;
    if(t===0)ex.push({type:'fr2en',pair:p});
    else if(t===1)ex.push({type:'listen',pair:p});
    else ex.push({type:'en2fr',pair:p});
  });
  les.sentences.forEach(s=>ex.push({type:'bank',s}));
  return shuffle(ex).slice(0,9);
}

/* ================= LESSON FLOW ================= */
let L=null; // live lesson state
function startLesson(ui,li){
  const les=COURSE[ui].lessons[li];
  L={ui,li,ex:buildExercises(les),i:0,hearts:5,right:0,wrong:0,answered:false,sel:null,bankSel:[]};
  document.getElementById('pathView').style.display='none';
  document.getElementById('resultView').style.display='none';
  document.getElementById('lessonView').style.display='block';
  document.getElementById('checkBar').style.display='block';
  document.getElementById('mascot').style.display='none';
  renderEx();
}
function quitLesson(){
  document.getElementById('lessonView').style.display='none';
  document.getElementById('checkBar').style.display='none';
  document.getElementById('pathView').style.display='block';
  document.getElementById('mascot').style.display='block';
  speechSynthesis.cancel();
}
function backToPath(){quitLesson();document.getElementById('resultView').style.display='none';renderPath();}

function renderEx(){
  const e=L.ex[L.i];const area=document.getElementById('exArea');
  L.answered=false;L.sel=null;L.bankSel=[];
  document.getElementById('lfill').style.width=(L.i/L.ex.length*100)+'%';
  document.getElementById('lhearts').textContent='💜 '+L.hearts;
  const fb=document.getElementById('feedback');fb.className='feedback';fb.innerHTML='';
  const btn=document.getElementById('checkBtn');btn.textContent='Check';btn.disabled=true;btn.classList.remove('continue');

  let html='';
  if(e.type==='fr2en'){
    html=`<div class="exType">Translate to English</div>
      <div class="prompt">${e.pair[0]} <button class="hearBtn" onclick="speak('${esc(e.pair[0])}')">🔊</button></div>
      <div class="pron">${e.pair[1]}</div><div class="opts" id="opts"></div>`;
    area.innerHTML=html; renderOpts(shuffle([e.pair[2],...distractors(e.pair[2],3,2)]),e.pair[2]);
    speak(e.pair[0]);
  }
  else if(e.type==='en2fr'){
    html=`<div class="exType">Translate to French</div>
      <div class="prompt">${e.pair[2]}</div><div class="opts" id="opts"></div>`;
    area.innerHTML=html; renderOpts(shuffle([e.pair[0],...distractors(e.pair[0],3,0)]),e.pair[0],true);
  }
  else if(e.type==='listen'){
    html=`<div class="exType">What do you hear?</div>
      <div class="prompt"><button class="hearBtn" style="width:72px;height:72px;font-size:1.8rem" onclick="speak('${esc(e.pair[0])}')">🔊</button> Tap to listen</div>
      <div class="opts" id="opts"></div>`;
    area.innerHTML=html; renderOpts(shuffle([e.pair[0],...distractors(e.pair[0],3,0)]),e.pair[0],true);
    speak(e.pair[0]);
  }
  else if(e.type==='bank'){
    const words=shuffle(e.s.fr.split(' '));
    html=`<div class="exType">Build the sentence</div>
      <div class="prompt">"${e.s.en}"</div>
      <div class="answerZone" id="azone"></div>
      <div class="bank" id="bank">${words.map((w,i)=>`<button class="chip" data-w="${esc(w)}" data-i="${i}" onclick="pickChip(this)">${w}</button>`).join('')}</div>`;
    area.innerHTML=html;
  }
}
function esc(s){return s.replace(/'/g,"\\'")}
function renderOpts(opts,correct,speakOnPick){
  const box=document.getElementById('opts');
  opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="key">${i+1}</span> ${o}`;b.dataset.v=o;
    b.onclick=()=>{
      if(L.answered)return;
      box.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');L.sel=o;
      if(speakOnPick)speak(o);
      document.getElementById('checkBtn').disabled=false;
    };
    box.appendChild(b);
  });
  L.correct=correct;
}
function pickChip(btn){
  if(L.answered)return;
  const az=document.getElementById('azone');
  if(btn.parentElement.id==='bank'){
    btn.classList.add('used');
    const c=document.createElement('button');c.className='chip';c.textContent=btn.dataset.w;
    c.dataset.src=btn.dataset.i;
    c.onclick=()=>{if(L.answered)return;
      document.querySelector(`#bank .chip[data-i="${c.dataset.src}"]`).classList.remove('used');
      c.remove();updateBankState();};
    az.appendChild(c);
  }
  updateBankState();
}
function updateBankState(){
  const az=document.getElementById('azone');
  document.getElementById('checkBtn').disabled=az.children.length===0;
}

function onCheck(){
  const btn=document.getElementById('checkBtn');
  if(L.answered){ // continue
    L.i++;
    if(L.hearts<=0){failLesson();return;}
    if(L.i>=L.ex.length){finishLesson();return;}
    renderEx();return;
  }
  const e=L.ex[L.i];let ok=false,answer='';
  if(e.type==='bank'){
    const got=[...document.getElementById('azone').children].map(c=>c.textContent).join(' ');
    ok=got.toLowerCase()===e.s.fr.toLowerCase();answer=e.s.fr;
  }else{
    ok=L.sel===L.correct;answer=L.correct;
    document.querySelectorAll('#opts .opt').forEach(x=>{
      if(x.dataset.v===L.correct)x.classList.add('right');
      else if(x.dataset.v===L.sel&&!ok)x.classList.add('wrong');
    });
  }
  L.answered=true;
  const fb=document.getElementById('feedback');
  if(ok){L.right++;fb.className='feedback good';fb.innerHTML='✓ Excellent !';playTone(true);}
  else{L.wrong++;L.hearts--;fb.className='feedback bad';
    fb.innerHTML=`✗ Pas tout à fait<small>Answer: ${answer}</small>`;playTone(false);
    document.getElementById('lhearts').textContent='💜 '+L.hearts;}
  btn.textContent='Continue';btn.classList.add('continue');btn.disabled=false;
}
function playTone(good){
  try{const ctx=playTone.ctx||(playTone.ctx=new (window.AudioContext||window.webkitAudioContext)());
  const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
  o.frequency.value=good?880:220;o.type='sine';g.gain.setValueAtTime(.12,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);o.start();o.stop(ctx.currentTime+.3);
  if(good){const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);
  o2.frequency.value=1320;g2.gain.setValueAtTime(.1,ctx.currentTime+.1);
  g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);o2.start(ctx.currentTime+.1);o2.stop(ctx.currentTime+.4);}}catch(e){}
}
function finishLesson(){
  const key=lessonKey(L.ui,L.li);
  const firstTime=!S.done[key];
  const gained=(firstTime?20:10)+L.right*2;
  S.done[key]=true;S.xp+=gained;bumpStreak();save();
  document.getElementById('lessonView').style.display='none';
  document.getElementById('checkBar').style.display='none';
  document.getElementById('resultView').style.display='block';
  document.getElementById('resEmoji').textContent='🐈‍⬛';
  document.getElementById('resTitle').textContent='Leçon terminée !';
  document.getElementById('resSub').textContent='The Paris night is yours.';
  document.getElementById('resXP').textContent='+'+gained;
  const acc=Math.round(L.right/(L.right+L.wrong||1)*100);
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resStreak').textContent=S.streak;
  refreshStats();confetti();
}
function failLesson(){
  document.getElementById('lessonView').style.display='none';
  document.getElementById('checkBar').style.display='none';
  document.getElementById('resultView').style.display='block';
  document.getElementById('resEmoji').textContent='😿';
  document.getElementById('resTitle').textContent='Plus de cœurs...';
  document.getElementById('resSub').textContent='Out of hearts — but the night is long. Try again!';
  document.getElementById('resXP').textContent='+0';
  const acc=Math.round(L.right/(L.right+L.wrong||1)*100);
  document.getElementById('resAcc').textContent=acc+'%';
  document.getElementById('resStreak').textContent=S.streak;
}
function confetti(){
  const emo=['🌙','⭐','✨','🥖','🐈‍⬛','🗼'];
  for(let i=0;i<28;i++){const e=document.createElement('div');e.className='confetti';
  e.textContent=emo[Math.floor(Math.random()*emo.length)];
  e.style.left=Math.random()*100+'vw';e.style.animationDuration=(1.5+Math.random()*2)+'s';
  document.body.appendChild(e);setTimeout(()=>e.remove(),3800);}
}

/* ================= MASCOT ================= */
const LINES=[
  "Minou says: 15 minutes a night keeps the streak alive. 🌙",
  "Miaou ! Say every answer out loud — your mouth learns too.",
  "Tip: 'Je voudrais' + pointing = survival in all of France.",
  "The night is dark and full of verbs. ⚡",
  "Streaks are earned after midnight... or any time, really.",
  "Perdu ? Cliquez le hibou— non, le CHAT. Cliquez le chat. 🐈‍⬛"
];
function mascotTalk(){
  const b=document.getElementById('bubble');
  b.textContent=LINES[Math.floor(Math.random()*LINES.length)];
  b.classList.add('show');clearTimeout(mascotTalk.t);
  mascotTalk.t=setTimeout(()=>b.classList.remove('show'),4200);
}

/* keyboard: 1-4 select option, Enter = check */
document.addEventListener('keydown',e=>{
  if(document.getElementById('lessonView').style.display!=='block')return;
  if(/^[1-4]$/.test(e.key)){const o=document.querySelectorAll('#opts .opt')[+e.key-1];if(o)o.click();}
  if(e.key==='Enter'){const b=document.getElementById('checkBtn');if(!b.disabled)b.click();}
});

renderPath();
setTimeout(mascotTalk,1200);

/* PWA service worker */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
